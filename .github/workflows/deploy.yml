name: CI/CD - Sistema de Reservas

# QA corre en PR hacia develop/main Y en push a main.
# El push es necesario: si QA solo disparara en PR, en el push a main el job
# quedaria "skipped" y GitHub saltaria tambien build/deploy por el needs.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

# Variables fijas de infraestructura. Ajusta estos valores a tus recursos reales.
env:
  ACR_NAME: acrsistemareservas
  ACR_LOGIN_SERVER: acrsistemareservas.azurecr.io
  RESOURCE_GROUP: rg-sistema-reservas
  BACKEND_IMAGE: sistema-reservas/backend
  FRONTEND_IMAGE: sistema-reservas/frontend
  BACKEND_WEBAPP: sistema-reservas-api
  FRONTEND_WEBAPP: sistema-reservas-web
  IMAGE_TAG: ${{ github.run_id }}

jobs:
  # =========================================================
  # Etapa 1 - Q/A en el runner local de Windows
  # =========================================================
  qa:
    name: Q/A - validaciones locales
    runs-on: [self-hosted, Windows, QA]
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # El runner self-hosted no se limpia entre corridas: si quedo un .env
      # de una ejecucion anterior, docker compose leeria valores viejos.
      - name: Preparar .env de prueba
        run: Copy-Item .env.example .env -Force

      - name: Backend - instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Backend - validar sintaxis
        working-directory: backend
        run: Get-ChildItem -Path src -Recurse -Filter *.js | ForEach-Object { node --check $_.FullName }

      - name: Backend - auditoria de vulnerabilidades
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend - instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Frontend - build de prueba
        working-directory: frontend
        run: npm run build

      - name: Frontend - auditoria de vulnerabilidades
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      # Valida que ambos Dockerfile compilen antes de gastar minutos en la nube.
      - name: Docker Compose - build de prueba
        run: docker compose build

      - name: Limpiar artefactos del runner
        if: always()
        run: |
          Remove-Item -Recurse -Force frontend/dist -ErrorAction SilentlyContinue
          Remove-Item -Force .env -ErrorAction SilentlyContinue
          docker image prune -f

  # =========================================================
  # Etapa 2 - Build y push de imagenes al ACR
  # =========================================================
  build-and-push:
    name: Build y push al ACR
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Reutiliza la sesion de azure/login: no hacen falta usuario/password del ACR.
      - name: Login en el ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Backend - build y push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # VITE_API_URL se hornea aqui: Vite resuelve las VITE_* en build, no en runtime.
      - name: Frontend - build y push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================
  # Etapa 3 - Deploy a App Service for Containers
  # =========================================================
  deploy:
    name: Deploy a App Service
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Los settings van antes del deploy para que el contenedor arranque configurado.
      - name: Backend - app settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.BACKEND_WEBAPP }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          app-settings-json: |
            [
              { "name": "NODE_ENV",      "value": "production",                    "slotSetting": false },
              { "name": "PORT",          "value": "4000",                          "slotSetting": false },
              { "name": "WEBSITES_PORT", "value": "4000",                          "slotSetting": false },
              { "name": "DB_HOST",       "value": "${{ secrets.DB_HOST }}",        "slotSetting": false },
              { "name": "DB_PORT",       "value": "3306",                          "slotSetting": false },
              { "name": "DB_NAME",       "value": "${{ secrets.DB_NAME }}",        "slotSetting": false },
              { "name": "DB_USER",       "value": "${{ secrets.DB_USER }}",        "slotSetting": false },
              { "name": "DB_PASSWORD",   "value": "${{ secrets.DB_PASSWORD }}",    "slotSetting": false },
              { "name": "JWT_SECRET",    "value": "${{ secrets.JWT_SECRET }}",     "slotSetting": false },
              { "name": "CORS_ORIGIN",   "value": "${{ secrets.CORS_ORIGIN }}",    "slotSetting": false }
            ]

      - name: Backend - deploy del contenedor
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_WEBAPP }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Frontend - app settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.FRONTEND_WEBAPP }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          app-settings-json: |
            [
              { "name": "WEBSITES_PORT", "value": "80", "slotSetting": false }
            ]

      - name: Frontend - deploy del contenedor
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_WEBAPP }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      # Si el backend no responde 200, el deploy se marca en rojo.
      - name: Smoke test del backend
        run: |
          set -e
          echo "Esperando a que el backend levante..."
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.BACKEND_WEBAPP }}.azurewebsites.net/health" || true)
            echo "Intento $i -> HTTP $code"
            if [ "$code" = "200" ]; then echo "Backend OK"; exit 0; fi
            sleep 10
          done
          echo "El backend no respondio 200 en /health"
          exit 1

      - name: Cerrar sesion de Azure
        if: always()
        run: az logout
